        const calculateSMA = (data, window) => {
            if (data.length < window) return null;
            return data.slice(-window).reduce((a, b) => a + b) / window;
        };

        const calculateEMA = (data, window) => {
            if (data.length < window) return null;
            const k = 2 / (window + 1);
            let ema = data[0]; 
            for (let i = 1; i < data.length; i++) {
                ema = data[i] * k + ema * (1 - k);
            }
            return ema;
        };

        const calculateEMAHistory = (data, window) => {
            if (data.length < window) return [];
            const k = 2 / (window + 1);
            let emaArray = [data.slice(0, window).reduce((a, b) => a + b) / window];
            for (let i = window; i < data.length; i++) {
                emaArray.push(data[i] * k + emaArray[emaArray.length - 1] * (1 - k));
            }
            return emaArray;
        };

        const calculateMACD = (data) => {
            const ema12 = calculateEMAHistory(data, 12);
            const ema26 = calculateEMAHistory(data, 26);
            if (ema12.length < 26 || ema26.length === 0) return null;
            
            const macdLine = [];
            const offset = ema12.length - ema26.length;
            for(let i = 0; i < ema26.length; i++) {
                macdLine.push(ema12[i + offset] - ema26[i]);
            }
            
            const signalLine = calculateEMAHistory(macdLine, 9);
            if (signalLine.length === 0) return null;

            return { 
                macd: macdLine[macdLine.length - 1], 
                signal: signalLine[signalLine.length - 1],
                hist: macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1]
            };
        };

        const calculateRSI = (data, window = 14) => {
            if (data.length < window + 1) return null;
            let gains = 0, losses = 0;
            for (let i = data.length - window; i < data.length; i++) {
                const diff = data[i] - data[i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            const avgGain = gains / window;
            const avgLoss = losses / window;
            if (avgLoss === 0) return 100;
            return 100 - (100 / (1 + (avgGain / avgLoss)));
        };

        const calculateATR = (highs, lows, closes, window = 14) => {
            if (closes.length < window + 1) return null;
            let trArray = [];
            for (let i = 1; i < closes.length; i++) {
                const hl = highs[i] - lows[i];
                const hc = Math.abs(highs[i] - closes[i - 1]);
                const lc = Math.abs(lows[i] - closes[i - 1]);
                trArray.push(Math.max(hl, hc, lc));
            }
            let atr = trArray.slice(0, window).reduce((a, b) => a + b) / window;
            for(let i = window; i < trArray.length; i++) {
                atr = (atr * (window - 1) + trArray[i]) / window;
            }
            return atr;
        };

        const calculateBollingerBands = (data, window = 20, multiplier = 2) => {
            if (data.length < window) return null;
            const sma = calculateSMA(data, window);
            const variance = data.slice(-window).reduce((sum, val) => sum + Math.pow(val - sma, 2), 0) / window;
            const stdDev = Math.sqrt(variance);
            return { middle: sma, upper: sma + (multiplier * stdDev), lower: sma - (multiplier * stdDev) };
        };

        const calculateStochastic = (highs, lows, closes, period = 14, smoothK = 3) => {
            if (closes.length < period) return null;
            let stochK = [];
            for (let i = period - 1; i < closes.length; i++) {
                const windowHighs = highs.slice(i - period + 1, i + 1);
                const windowLows = lows.slice(i - period + 1, i + 1);
                const highestHigh = Math.max(...windowHighs);
                const lowestLow = Math.min(...windowLows);
                const currentClose = closes[i];
                const k = highestHigh === lowestLow ? 50 : ((currentClose - lowestLow) / (highestHigh - lowestLow)) * 100;
                stochK.push(k);
            }
            const currentK = stochK[stochK.length - 1];
            const smoothKVal = calculateSMA(stochK, smoothK);
            return { k: currentK, d: smoothKVal };
        };

        const calculateVolumeSurge = (volumes, window = 20) => {
            if (volumes.length < window + 1) return null;
            const currentVol = volumes[volumes.length - 1];
            const avgVol = volumes.slice(-window - 1, -1).reduce((a, b) => a + b, 0) / window;
            return {
                current: currentVol,
                average: avgVol,
                isSurging: currentVol > (avgVol * 1.2) 
            };
        };

        function App() {
            const assets = [
                { symbol: 'PAXG', name: 'EMAS SPOT (XAU)', tvSymbol: 'OANDA:XAUUSD' },
                { symbol: 'BTC', name: 'BITCOIN (BTC)', tvSymbol: 'BINANCE:BTCUSDT' },
                { symbol: 'ETH', name: 'ETHEREUM (ETH)', tvSymbol: 'BINANCE:ETHUSDT' }
            ];

            const timeframes = [
                { label: '5m', interval: '5m', tv: '5', ms: 5 * 60 * 1000 },
                { label: '15m', interval: '15m', tv: '15', ms: 15 * 60 * 1000 },
                { label: '30m', interval: '30m', tv: '30', ms: 30 * 60 * 1000 },
                { label: '1H', interval: '1h', tv: '60', ms: 60 * 60 * 1000 },
                { label: '4H', interval: '4h', tv: '240', ms: 240 * 60 * 1000 },
                { label: '1D', interval: '1d', tv: 'D', ms: 24 * 60 * 60 * 1000 },
                { label: '1W', interval: '1w', tv: 'W', ms: 7 * 24 * 60 * 60 * 1000 }
            ];

            const [asset, setAsset] = useState(assets[0]);
            const [timeframe, setTimeframe] = useState(timeframes[3]); // Default 1H
            const [marketData, setMarketData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [countdown, setCountdown] = useState("--:--");
            const [atrMultipliers, setAtrMultipliers] = useState({ tp1: 1.2, tp2: 2.2, sl: 1.5 });

            // --- STATE UNTUK TELEGRAM ALERTS ---
            const [showTgModal, setShowTgModal] = useState(false);
            const [tgToken, setTgToken] = useState(localStorage.getItem('tgToken') || '');
            const [tgChatId, setTgChatId] = useState(localStorage.getItem('tgChatId') || '');
            const [tgEnabled, setTgEnabled] = useState(localStorage.getItem('tgEnabled') === 'true');
            const [lastAlertKey, setLastAlertKey] = useState('');
            
            // --- STATE UNTUK FUNDAMENTAL NEWS ---
            const [newsData, setNewsData] = useState(null);
            const [isNewsPause, setIsNewsPause] = useState(false);

            // Custom Toast Notification State
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            useEffect(() => {
                localStorage.setItem('tgToken', tgToken);
                localStorage.setItem('tgChatId', tgChatId);
                localStorage.setItem('tgEnabled', tgEnabled);
            }, [tgToken, tgChatId, tgEnabled]);

            // Pengatur Detak Mundur Candle
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    const nextTick = Math.ceil(now.getTime() / timeframe.ms) * timeframe.ms;
                    let diff = nextTick - now.getTime();
                    let h = Math.floor(diff / (1000 * 60 * 60));
                    let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    let s = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    if (timeframe.label === '1W' || timeframe.label === '1M') {
                        setCountdown(`${Math.floor(h/24)} Hari lagi`);
                    } else {
                        setCountdown(`${h > 0 ? h + 'j ' : ''}${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [timeframe]);

            // --- FUNGSI MENGAMBIL BERITA FUNDAMENTAL ---
            const fetchNewsData = async () => {
                try {
                    let data = null;
                    try {
                        // Mencoba ambil langsung dari sumber publik JSON
                        const res = await fetch('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
                        if (!res.ok) throw new Error('Direct fetch failed');
                        data = await res.json();
                    } catch (err) {
                        // Jika terblokir CORS, gunakan proxy AllOrigins sebagai satelit cadangan
                        const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://nfs.faireconomy.media/ff_calendar_thisweek.json'));
                        const json = await res.json();
                        
                        // Mencegah error parse JSON jika server membalas dengan HTML (misal diblokir Cloudflare)
                        if (json.contents && typeof json.contents === 'string' && json.contents.trim().startsWith('<')) {
                            throw new Error('Akses API berita diblokir sementara oleh server sumber.');
                        }
                        
                        if (json.contents) {
                            data = JSON.parse(json.contents);
                        } else {
                            throw new Error('Data kosong dari proxy.');
                        }
                    }

                    if (!data || !Array.isArray(data)) return;

                    const now = new Date();
                    
                    // Filter: Hanya berita High Impact dan Mata Uang USD yang akan datang
                    const upcomingUSDNews = data.filter(item =>
                        item.impact === 'High' &&
                        item.country === 'USD' &&
                        new Date(item.date) > now
                    ).sort((a, b) => new Date(a.date) - new Date(b.date));

                    if (upcomingUSDNews.length > 0) {
                        const nextNews = upcomingUSDNews[0];
                        const newsDate = new Date(nextNews.date);
                        const diffMins = Math.floor((newsDate - now) / (1000 * 60));

                        setNewsData({
                            title: nextNews.title,
                            time: newsDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                            diffMins: diffMins
                        });
                        
                        // Sistem Pause: Aktif jika berita akan rilis dalam 30 menit ke depan, atau baru lewat 5 menit
                        setIsNewsPause(diffMins <= 30 && diffMins >= -5);
                    } else {
                        setNewsData(null);
                        setIsNewsPause(false);
                    }
                } catch (error) {
                    console.log('Mode peringatan berita fundamental dilewati (API timeout/blokir).');
                    setIsNewsPause(false); 
                }
            };

            const fetchMarketData = async () => {
                setLoading(true);
                setError(null);
                
                // HAPUS await fetchNewsData() DARI SINI

                try {
                    let highs = [], lows = [], closes = [], volumes = [];
                    const symbol = asset.symbol === 'PAXG' ? 'PAXGUSDT' : asset.symbol + 'USDT';
                    
                    try {
                        const binanceUrl = `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${timeframe.interval}&limit=100`;
                        const res = await fetch(binanceUrl);
                        if(!res.ok) throw new Error('Binance Vision diblokir');
                        const data = await res.json();
                        highs = data.map(c => parseFloat(c[2]));
                        lows = data.map(c => parseFloat(c[3]));
                        closes = data.map(c => parseFloat(c[4]));
                        volumes = data.map(c => parseFloat(c[5]));
                    } catch (err1) {
                        try {

                            if (timeframe.label === '5m') kucoinInterval = '5min';
                            else if (timeframe.label === '15m') kucoinInterval = '15min';
                            else if (timeframe.label === '30m') kucoinInterval = '30min';
                            else if (timeframe.label === '1H') kucoinInterval = '1hour';
                            else if (timeframe.label === '4H') kucoinInterval = '4hour';
                            else if (timeframe.label === '1D') kucoinInterval = '1day';
                            else if (timeframe.label === '1W') kucoinInterval = '1week';
                            
                            const kucoinSymbol = asset.symbol === 'PAXG' ? 'PAXG-USDT' : asset.symbol + '-USDT';
                            const kucoinUrl = `https://api.kucoin.com/api/v1/market/candles?type=${kucoinInterval}&symbol=${kucoinSymbol}`;
                            const res2 = await fetch(kucoinUrl);
                            const data2 = await res2.json();
                            if (data2.code !== '200000' || !data2.data) throw new Error('KuCoin gagal');
                            const reversedData = data2.data.reverse().slice(-100);
                            
                            highs = reversedData.map(c => parseFloat(c[3]));
                            lows = reversedData.map(c => parseFloat(c[4]));
                            closes = reversedData.map(c => parseFloat(c[2]));
                            volumes = reversedData.map(c => parseFloat(c[5]));

                            if (timeframe.label === '5m') { ccApi = 'histominute'; ccAgg = 5; }
                            else if (timeframe.label === '15m') { ccApi = 'histominute'; ccAgg = 15; }
                            else if (timeframe.label === '30m') { ccApi = 'histominute'; ccAgg = 30; }
                            else if (timeframe.label === '1H') { ccApi = 'histohour'; ccAgg = 1; }
                            else if (timeframe.label === '4H') { ccApi = 'histohour'; ccAgg = 4; }
                            else if (timeframe.label === '1D') { ccApi = 'histoday'; ccAgg = 1; }
                            else if (timeframe.label === '1W') { ccApi = 'histoday'; ccAgg = 7; }
                            
                            const ccUrl = `https://min-api.cryptocompare.com/data/v2/${ccApi}?fsym=${asset.symbol}&tsym=USD&limit=100&aggregate=${ccAgg}`;
                            const res3 = await fetch(ccUrl);
                            const data3 = await res3.json();
                            if (data3.Response !== 'Success' || !data3.Data || !data3.Data.Data) throw new Error('Koneksi cadangan gagal');
                            
                            highs = data3.Data.Data.map(c => parseFloat(c.high));
                            lows = data3.Data.Data.map(c => parseFloat(c.low));
                            closes = data3.Data.Data.map(c => parseFloat(c.close));
                            volumes = data3.Data.Data.map(c => parseFloat(c.volumeto));
                        }
                    }

                    if (closes.length === 0) throw new Error('Gagal mendapatkan respon data.');

                    const currentPrice = closes[closes.length - 1];
                    
                    setMarketData({
                        price: currentPrice,
                        sma50: calculateSMA(closes, 50),
                        ema9: calculateEMA(closes, 9),
                        ema21: calculateEMA(closes, 21),
                        rsi: calculateRSI(closes, 14),
                        macd: calculateMACD(closes),
                        atr: calculateATR(highs, lows, closes, 14),
                        bb: calculateBollingerBands(closes, 20, 2),
                        stoch: calculateStochastic(highs, lows, closes, 14, 3),
                        volSurge: calculateVolumeSurge(volumes, 20),
                        timestamp: new Date().toLocaleTimeString()
                    });
                } catch (e) {
                    setError("Menghubungkan ke node satelit sekunder...");
                    setMarketData(null);
                }
                setLoading(false);
            };

            useEffect(() => {
                // Memanggil keduanya secara paralel (berbarengan) tanpa saling tunggu
                fetchMarketData();
                fetchNewsData(); 
                
                const interval = setInterval(() => {
                    fetchMarketData();
                    fetchNewsData();
                }, 60000);
                
                return () => clearInterval(interval);
            }, [asset, timeframe]);

            const getConfluenceChecklist = () => {
                if (!marketData || !marketData.stoch || !marketData.volSurge) return null;
                const { price, ema9, ema21, sma50, rsi, macd, bb, stoch, volSurge } = marketData;

                const checkTrend = ema9 > ema21 && price > sma50;
                const checkTrendBear = ema9 < ema21 && price < sma50;
                const checkMomentum = macd && macd.macd > macd.signal;
                const checkMomentumBear = macd && macd.macd < macd.signal;
                const checkRsiBull = rsi < 65 && rsi > 40; 
                const checkRsiBear = rsi > 35 && rsi < 60; 
                const checkBbBull = bb ? price < (bb.upper * 0.995) : true;
                const checkBbBear = bb ? price > (bb.lower * 1.005) : true;
                const checkStochBull = stoch.k > stoch.d && stoch.k < 80;
                const checkStochBear = stoch.k < stoch.d && stoch.k > 20;

                                        </div>

                                        <div className="bg-black/30 p-3 rounded-xl border border-slate-800/80 relative overflow-hidden">
                                            {marketData.volSurge?.isSurging && <div className="absolute top-0 right-0 w-2 h-full bg-amber-500 animate-pulse"></div>}
                                            <p className="text-[10px] uppercase text-slate-500 font-bold mb-1">Status Volume</p>
                                            <div className="flex items-end gap-2">
                                                <span className={`font-mono text-sm font-bold ${marketData.volSurge?.isSurging ? 'text-amber-400' : 'text-slate-400'}`}>
                                                    {marketData.volSurge?.isSurging ? 'SURGE DETECTED' : 'NORMAL'}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-pulse h-16 bg-slate-800/50 rounded-xl"></div>
                                )}
                            </div>

                            <div className="bg-[#0f172a] rounded-[2rem] p-4 border border-slate-800 shadow-2xl h-[500px] md:h-[650px] flex-grow flex flex-col relative overflow-hidden">
                                <div className="absolute top-[-30%] right-[-10%] w-[60%] h-[60%] bg-amber-600/10 blur-[120px] rounded-full pointer-events-none"></div>

                                <div className="flex justify-between items-center mb-3 px-2 relative z-10">
                                    <h3 className="font-bold text-white flex items-center gap-2">
                                        <BarChart className="w-5 h-5 text-amber-500"/> 
                                        Advanced Radar ({timeframe.label})
                                    </h3>
                                    {marketData && <span className="text-[10px] font-mono text-slate-500 bg-black/40 px-3 py-1 rounded-lg border border-slate-800">Sync: {marketData.timestamp}</span>}
                                </div>
                                
                                <div className="flex-grow rounded-2xl overflow-hidden border border-slate-800 relative bg-[#020617] shadow-[inset_0_0_30px_rgba(0,0,0,0.8)] z-10">
                                    {loading && (
                                        <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#020617]/80 backdrop-blur-md">
                                            <div className="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                            <p className="text-xs text-amber-500/80 font-mono tracking-widest uppercase">Sinkronisasi Kelembagaan...</p>
                                        </div>
                                    )}
                                    <iframe 
                                        key={timeframe.tv + asset.symbol}
                                        title="Chart"
                                        src={`https://s.tradingview.com/widgetembed/?frameElementId=tradingview_widget&symbol=${asset.tvSymbol}&interval=${timeframe.tv}&theme=dark&style=1&hidesidetoolbar=1&studies=MACD@tv-basicstudies%1FBB@tv-basicstudies%1FStochastic@tv-basicstudies%1FVolume@tv-basicstudies`}
                                        className="w-full h-full border-0 relative z-10"
                                        allowFullScreen
                                    />
                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
